<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Erinnerungsfoto — Hochzeit</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;1,400&family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&display=swap" rel="stylesheet">
    <style>
        @page {
            size: A4;
            margin: 10mm;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #f5f5f5;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Cormorant Garamond', serif;
        }
        .print-info {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: #333;
            color: #fff;
            padding: 12px 24px;
            border-radius: 8px;
            font-family: Arial, sans-serif;
            font-size: 14px;
            z-index: 100;
        }
        .print-info a { color: #8BB4FF; cursor: pointer; text-decoration: underline; }

        .card {
            width: 16.5cm;
            height: 11.5cm;
            background: #fff;
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        /* Dünner eleganter Rahmen */
        .border-outer {
            position: absolute;
            inset: 8mm;
            border: 0.5px solid #c8c0b8;
        }
        .border-inner {
            position: absolute;
            inset: 10mm;
            border: 0.3px solid #d8d2ca;
        }

        /* Eckverzierungen */
        .corner {
            position: absolute;
            width: 18mm;
            height: 18mm;
        }
        .corner svg { width: 100%; height: 100%; }
        .corner-tl { top: 6mm; left: 6mm; }
        .corner-tr { top: 6mm; right: 6mm; transform: scaleX(-1); }
        .corner-bl { bottom: 6mm; left: 6mm; transform: scaleY(-1); }
        .corner-br { bottom: 6mm; right: 6mm; transform: scale(-1, -1); }

        /* Kleines Ornament oben */
        .ornament-top {
            position: absolute;
            top: 14mm;
            left: 50%;
            transform: translateX(-50%);
            color: #c8c0b8;
            font-size: 10pt;
            letter-spacing: 8px;
        }

        /* Haupttext */
        .main-text {
            font-family: 'Playfair Display', serif;
            font-style: italic;
            font-weight: 400;
            font-size: 13pt;
            color: #2a2a2a;
            text-align: center;
            line-height: 1.6;
            padding: 0 20mm;
            position: relative;
        }

        /* Kleine Linie unter dem Text */
        .divider {
            width: 30mm;
            height: 0.5px;
            background: #c8c0b8;
            margin-top: 6mm;
        }

        /* Dezentes Blatt-Ornament unten */
        .ornament-bottom {
            position: absolute;
            bottom: 14mm;
            left: 50%;
            transform: translateX(-50%);
        }

        /* Print Layout: 2 pro A4-Seite */
        @media print {
            .print-info { display: none; }
            body {
                background: #fff;
                display: block;
            }
            .page-wrap {
                display: flex;
                flex-wrap: wrap;
                justify-content: center;
                align-content: flex-start;
                gap: 5mm;
            }
            .card {
                page-break-inside: avoid;
                box-shadow: none;
                border: 0.2px solid #eee;
            }
        }

        @media screen {
            .card {
                box-shadow: 0 4px 20px rgba(0,0,0,0.08);
                border-radius: 2px;
            }
            .page-wrap {
                display: flex;
                flex-wrap: wrap;
                justify-content: center;
                gap: 20px;
                padding: 80px 20px 40px;
                max-width: 900px;
            }
        }
    </style>
</head>
<body>
    <div class="print-info">
        Druckeinstellung: A4, Ränder "Minimal" oder "Schmal" — <a onclick="window.print()">🖨️ Jetzt drucken</a>
    </div>
    <div class="page-wrap">
        <!-- 2 Karten pro Seite, 12 Seiten = 24 Karten -->
        <script>
            for (let i = 0; i < 24; i++) {
                document.write(`
                <div class="card">
                    <div class="border-outer"></div>
                    <div class="border-inner"></div>

                    <!-- Eckverzierungen -->
                    <div class="corner corner-tl"><svg viewBox="0 0 50 50" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M2 2 C2 2, 2 48, 2 48" stroke="#c8c0b8" stroke-width="0.4"/><path d="M2 2 C2 2, 48 2, 48 2" stroke="#c8c0b8" stroke-width="0.4"/><path d="M2 8 C2 8, 8 2, 8 2" stroke="#c8c0b8" stroke-width="0.3" fill="none"/><circle cx="2" cy="2" r="1.5" fill="#c8c0b8"/></svg></div>
                    <div class="corner corner-tr"><svg viewBox="0 0 50 50" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M2 2 C2 2, 2 48, 2 48" stroke="#c8c0b8" stroke-width="0.4"/><path d="M2 2 C2 2, 48 2, 48 2" stroke="#c8c0b8" stroke-width="0.4"/><path d="M2 8 C2 8, 8 2, 8 2" stroke="#c8c0b8" stroke-width="0.3" fill="none"/><circle cx="2" cy="2" r="1.5" fill="#c8c0b8"/></svg></div>
                    <div class="corner corner-bl"><svg viewBox="0 0 50 50" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M2 2 C2 2, 2 48, 2 48" stroke="#c8c0b8" stroke-width="0.4"/><path d="M2 2 C2 2, 48 2, 48 2" stroke="#c8c0b8" stroke-width="0.4"/><path d="M2 8 C2 8, 8 2, 8 2" stroke="#c8c0b8" stroke-width="0.3" fill="none"/><circle cx="2" cy="2" r="1.5" fill="#c8c0b8"/></svg></div>
                    <div class="corner corner-br"><svg viewBox="0 0 50 50" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M2 2 C2 2, 2 48, 2 48" stroke="#c8c0b8" stroke-width="0.4"/><path d="M2 2 C2 2, 48 2, 48 2" stroke="#c8c0b8" stroke-width="0.4"/><path d="M2 8 C2 8, 8 2, 8 2" stroke="#c8c0b8" stroke-width="0.3" fill="none"/><circle cx="2" cy="2" r="1.5" fill="#c8c0b8"/></svg></div>

                    <!-- Dezentes Ornament oben -->
                    <div class="ornament-top">✦ &nbsp; ✦ &nbsp; ✦</div>

                    <!-- Haupttext -->
                    <div class="main-text">
                        Hier ist Platz<br>für ein Erinnerungsfoto
                    </div>

                    <div class="divider"></div>

                    <!-- Blättchen unten -->
                    <div class="ornament-bottom">
                        <svg width="40mm" height="8mm" viewBox="0 0 120 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                            <path d="M60 12 C50 8, 35 4, 20 8 C30 6, 45 4, 60 12Z" fill="#d8d2ca" opacity="0.5"/>
                            <path d="M60 12 C70 8, 85 4, 100 8 C90 6, 75 4, 60 12Z" fill="#d8d2ca" opacity="0.5"/>
                            <path d="M60 12 C52 10, 40 10, 30 14 C42 10, 52 10, 60 12Z" fill="#c8c0b8" opacity="0.4"/>
                            <path d="M60 12 C68 10, 80 10, 90 14 C78 10, 68 10, 60 12Z" fill="#c8c0b8" opacity="0.4"/>
                            <circle cx="60" cy="12" r="1.5" fill="#c8c0b8"/>
                        </svg>
                    </div>
                </div>
                `);
            }
        </script>
    </div>
</body>
</html>
